name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com

      - name: Install NPM
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Release
        # release-it bumps the version, writes the changelog, tags, creates the
        # GitHub Release and publishes to GitHub Packages.
        run: npm run release -- --ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Publish to npm
        # Trusted publishing (OIDC): no token needed — npm exchanges the job's
        # id-token for a short-lived credential and generates provenance
        # automatically. Requires npm >= 11.5.1, so refresh npm first. The
        # `@ecssc:registry` override beats the GitHub Packages scope pin in
        # .npmrc (that pin is only used for installs).
        run: |
          npm install -g npm@latest
          npm publish --access public --@ecssc:registry=https://registry.npmjs.org
